openapi: 3.0.3
info:
  title: MyNotes API
  description: |
    REST API for the mynotes application. A `notes` resource demonstrates the
    full stack: OpenAPI → ogen server stubs → handler → service → repository →
    SQLite. Endpoints are served under the `/api/v1` base path (applied via the
    server URL and ogen's path prefix). Timestamps use RFC 3339 (UTC). Errors
    return `{"error": "message"}`.

    # Markdown dialect

    A note's `content` is stored and returned as verbatim Markdown. Consumers
    that render notes (the embedded web UI, the native mobile app, HTML export)
    should interpret it as follows.

    ## Base and extensions

    The base syntax is [CommonMark](https://spec.commonmark.org/) plus a small,
    fixed subset of [GitHub Flavored Markdown](https://github.github.com/gfm/) extensions:

    - **Tables** — GFM [§4.10 Tables](https://github.github.com/gfm/#tables-extension-).
    - **Strikethrough** — GFM [§6.5](https://github.github.com/gfm/#strikethrough-extension-),
      `~~deleted~~`.
    - **Autolinks** — bare URLs and email addresses are linkified, GFM
      [§6.9](https://github.github.com/gfm/#autolinks-extension-).
    - **Task lists** — GFM [§5.3](https://github.github.com/gfm/#task-list-items-extension-),
      `- [ ]` / `- [x]`. A list item whose text begins with such a marker
      renders as a **disabled (read-only) checkbox**, checked for `[x]`
      (case-insensitive) and unchecked for `[ ]`. The checkbox is presentational
      only — toggling it is a content edit that rewrites the marker in the
      stored Markdown, not a separate state.

    No other extensions are part of the dialect. Footnotes, definition lists
    and YAML front matter are not interpreted.

    ## Math (AsciiMath)

    [AsciiMath](https://asciimath.org) written between single dollars (`$x^2$`)
    renders as inline MathML and between double dollars (`$$…$$`, either inline
    or as a multi-line block) as display MathML. A literal dollar is written
    `\$`; a `$` that is not part of a valid pair (e.g. currency like `$5`) stays
    literal. This is a **render-time transform**: the AsciiMath source is stored
    verbatim in the `content` Markdown and converted to MathML at render time —
    in the browser by the web UI's vendored `asciimath2ml` library, and on the
    server (by a Go port of the same library) for the `download-html` endpoint —
    with the generated `<math>` passing through the same sanitization gate as all
    other rendered HTML. MathML embedded directly as raw HTML is also permitted
    (see "Raw HTML"); that MathML is stored verbatim and is not a transform.

    A consumer that renders `content` itself must run the AsciiMath transform to
    display math. Consumers that only pass `content` through unchanged receive
    the literal `$…$` source; the `download-html` endpoint returns rendered
    MathML.

    ## Raw HTML

    Raw inline and block HTML is permitted but restricted to a safe subset
    (broadly the bluemonday UGC / DOMPurify allow-list: common prose, table,
    figure and media elements, plus inline SVG and MathML). The sole permitted
    form control is the task-list checkbox — `<input type="checkbox">` with only
    `checked`/`disabled` attributes; any other `input` type or attribute is
    disallowed. Disallowed constructs — `script`, `style`, `iframe`, `object`,
    other form controls, `on*` event-handler attributes, and any URL whose
    scheme is not `http`, `https` or `mailto` — are rejected at write time
    (`400`), so stored content is
    always safe. Renderers should still sanitize with an equivalent allow-list
    as defense in depth.

    ## Images and artifacts

    Images use standard Markdown image syntax, `![alt](url)`. Binary images
    uploaded via `POST /artifacts` are content-addressed and referenced by
    their SHA-256, e.g. `![diagram](/api/v1/artifacts/<sha256>)`. Inline
    `data:` image URIs are also allowed for the `gif`, `png`, `jpeg` and
    `webp` types.

    ## Internal wikilinks (application-specific)

    A `[[...]]` syntax — modelled on the wiki-link convention — links to other 
    notes and tags **within the app**. It is not part of CommonMark or GFM, 
    so consumers must implement it themselves.

    Grammar: the target slug must match `^[a-z0-9]+(?:-[a-z0-9]+)*$` (the same
    pattern as note/tag slugs). An optional leading `#` sigil selects a tag
    instead of a note. An optional `|` introduces display text, which may be
    any run of characters except `]` and newline. Any `[[...]]` that does not
    match these forms is left as literal text.

    | Syntax | Target | Default display text |
    | --- | --- | --- |
    | `[[slug]]` | note with that slug | `slug` |
    | `[[slug\|Display text]]` | note with that slug | `Display text` |
    | `[[#slug]]` | the tag's note list | `#slug` |
    | `[[#slug\|Display text]]` | the tag's note list | `Display text` |

    Renderers should resolve note wikilinks to their own note-view route and
    tag wikilinks to their tag/filter view (the web UI uses `/notes/<slug>` and
    `/tags/<slug>`). Wikilinks are stored verbatim in `content`; they are a
    render-time convention and are **not** expanded by the
    `GET /notes/{slug}/export` HTML endpoint, which targets standalone viewing
    outside the app.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /notes:
    get:
      operationId: listNotes
      summary: List notes
      description: >
        Returns a page of notes. The browse list (no `q`) is ordered by the
        `sort`/`order` parameters, defaulting to update time, newest first.
        When `q` is supplied, results are restricted to notes matching the
        full-text query and ordered by relevance (`sort`/`order` are ignored).
      parameters:
        - name: q
          in: query
          description: Optional full-text search query.
          required: false
          schema:
            type: string
            maxLength: 200
        - name: tag
          in: query
          description: >
            Optional tag slug filter. When combined with `q`, both filters
            apply (AND semantics).
          required: false
          schema:
            type: string
            maxLength: 100
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        - name: titlePrefix
          in: query
          description: >
            When true and `q` is supplied, `q` is matched as a case-insensitive
            prefix of the note title (autocomplete style) instead of a full-text
            search; content is not matched. Ignored when `q` is empty.
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          description: >
            Field the browse list is sorted by. `updated` (default) and
            `created` sort by the respective timestamp; `title` sorts
            alphabetically, case-insensitively. Ignored for full-text search
            (`q` without `titlePrefix`), which is ordered by relevance, and for
            `titlePrefix` matching, which is always ordered by title.
          required: false
          schema:
            type: string
            enum: [updated, created, title]
            default: updated
        - name: order
          in: query
          description: >
            Direction for `sort`. `desc` (default) is newest-first for the
            timestamp fields and Z→A for `title`; `asc` is the reverse.
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createNote
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: The created note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: getNote
      summary: Get a note by slug
      responses:
        "200":
          description: The requested note.
          headers:
            Etag:
              description: >
                Strong entity tag reflecting the note's current version.
                Quoted integer, e.g. "1", "2".
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateNote
      summary: Update a note (partial)
      description: Only the fields present in the request body are changed.
      parameters:
        - name: If-Match
          in: header
          required: false
          description: >
            When provided, the update is rejected with 412 Precondition Failed
            unless the note's current version matches this Etag (quoted integer).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: The updated note.
          headers:
            Etag:
              description: Etag of the note after the update.
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "412":
          description: >
            Precondition Failed — If-Match was provided and the current version
            does not match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteNote
      summary: Delete a note
      responses:
        "204":
          description: Note deleted.
        default:
          $ref: "#/components/responses/Error"

  /tags:
    get:
      operationId: listTags
      summary: List all tags
      description: Returns all tags sorted by slug. Powers client-side autocomplete.
      responses:
        "200":
          description: All tags.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createTag
      summary: Create a tag
      description: >
        Tags must be created explicitly before being attached to a note (see
        the `tags` field on CreateNoteRequest/UpdateNoteRequest). A tag is
        identified solely by its `slug`, which is also its display label. A
        `slug` that collides with an existing tag is a 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: The created tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        default:
          $ref: "#/components/responses/Error"

  /tags/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    delete:
      operationId: deleteTag
      summary: Delete a tag
      description: >
        Removes the tag and detaches it from every note that had it. No
        orphan-prevention; deleting an unknown slug is a 404.
      responses:
        "204":
          description: Tag deleted.
        default:
          $ref: "#/components/responses/Error"

  /import:
    post:
      operationId: importNote
      summary: Import a document as a note
      description: >
        Imports a document and saves it as a note. Use `Content-Type: text/html`
        to import HTML (converted to Markdown; title taken from the <title>
        element or the first heading). Use `Content-Type: text/markdown` to
        import Markdown directly (title taken from the first ATX heading or the
        filename). The produced Markdown is subject to the same validation as
        regular note creation.
      requestBody:
        required: true
        content:
          text/html:
            schema:
              type: string
          text/markdown:
            schema:
              type: string
      responses:
        "201":
          description: The created note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"

  /artifacts:
    post:
      operationId: createArtifact
      summary: Upload an artifact
      description: >
        Uploads binary content and stores it as a content-addressed artifact
        keyed by the SHA-256 of the content. Uploading the same bytes twice
        returns the existing record unchanged. Supported content types are the
        common image formats. The SHA-256 hex digest is returned in the response
        and used in the artifact URL.
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/gif:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          image/svg+xml:
            schema:
              type: string
              format: binary
          application/mathml+xml:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: The created (or already existing) artifact.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
        default:
          $ref: "#/components/responses/Error"

  /artifacts/{sha256}:
    parameters:
      - name: sha256
        in: path
        required: true
        schema:
          type: string
          pattern: "^[0-9a-f]{64}$"
    get:
      operationId: getArtifact
      summary: Download an artifact by SHA-256
      description: >
        Returns the raw artifact content with its original `Content-Type`.
        The SHA-256 hex digest in the path identifies the artifact.
      responses:
        "200":
          description: The artifact content.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
            application/mathml+xml:
              schema:
                type: string
                format: binary
        "404":
          description: Artifact not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteArtifact
      summary: Delete an artifact
      responses:
        "204":
          description: Artifact deleted.
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}/download-markdown:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: downloadNoteMarkdown
      summary: Download a note as raw Markdown
      description: >
        Returns the note `content` as a raw Markdown body with a
        `Content-Disposition` attachment header. Errors keep the JSON
        `{"error": "message"}` shape.
      responses:
        "200":
          description: The note content as raw Markdown.
          headers:
            Content-Disposition:
              description: Attachment header carrying the download filename.
              required: true
              schema:
                type: string
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}/download-html:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: downloadNoteHtml
      summary: Download a note as HTML
      description: >
        Converts the note `content` from Markdown to HTML on the server and
        returns a complete HTML document with a `Content-Disposition` attachment
        header. Internal artifact images are inlined so the document is
        standalone. AsciiMath (`$…$` / `$$…$$`) is rendered to MathML, matching
        the on-screen view. Errors keep the JSON `{"error": "message"}` shape.
      responses:
        "200":
          description: The note rendered as a complete HTML document.
          headers:
            Content-Disposition:
              description: Attachment header carrying the download filename.
              required: true
              schema:
                type: string
            X-Content-Type-Options:
              description: Prevents MIME sniffing.
              required: true
              schema:
                type: string
            Content-Security-Policy:
              description: Sandboxes the document so scripts cannot execute.
              required: true
              schema:
                type: string
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}/split:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    post:
      operationId: splitNote
      summary: Split a note into several notes by Markdown headings
      description: >
        Creates one new note per section of the source note, cutting at the
        shallowest ATX heading level present (headings inside fenced code blocks
        are ignored). Content before the first such heading is discarded. Each
        new note takes its title from the section heading and shares the source
        note's `created_at` and `updated_at`; the source note is left unchanged.
        A note with no headings is a 400. The optional `tag` must name an
        existing tag (400 if unknown), attached to every new note.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitNoteRequest"
      responses:
        "201":
          description: The notes created from the split, in document order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SplitNoteResponse"
        default:
          $ref: "#/components/responses/Error"

components:
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Note:
      type: object
      required: [slug, title, content, created_at, updated_at, version, tags]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
          description: >
            Verbatim Markdown content of the note. See the "Markdown dialect"
            section in the API info description for how consumers (web UI,
            native app) should interpret and render it.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1
          description: >
            Monotonically increasing edit counter. Starts at 1 on creation and
            increments by 1 on each write. No-op PATCHes do not increment it.
            Use with If-Match for optimistic locking.
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Tags attached to this note; empty array when none, never absent.

    NoteSummary:
      type: object
      required: [slug, title, created_at, updated_at, excerpt, version, tags]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          minLength: 1
          maxLength: 200
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        excerpt:
          type: string
          description: Short text excerpt; empty string when none, never absent.
        version:
          type: integer
          minimum: 1
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
          description: Tags attached to this note; empty array when none, never absent.

    NoteList:
      type: object
      required: [total, notes]
      properties:
        total:
          type: integer
          description: Number of notes returned in this page.
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteSummary"

    CreateNoteRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
          default: ""
          description: >
            Markdown content; see the "Markdown dialect" section in the API
            info description. HTML carrying disallowed constructs is rejected
            (400).
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        tags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          description: >
            Slugs of existing tags to attach. Tags must already exist (create
            via POST /tags first) — an unknown slug is a 400. Absent or
            omitted defaults to no tags.

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
          description: >
            Markdown content; see the "Markdown dialect" section in the API
            info description. HTML carrying disallowed constructs is rejected
            (400).
        tags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          description: >
            Slugs of existing tags. Absent leaves the note's tags unchanged;
            present (including an empty array) replaces the full set. An
            unknown slug is a 400. Replacing with the same set as before is a
            no-op (does not bump `version`).

    SplitNoteRequest:
      type: object
      properties:
        tag:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          description: >
            Slug of an existing tag to attach to every note created by the
            split. Tags must already exist (create via POST /tags first) — an
            unknown slug is a 400. Absent or omitted attaches no tag.

    SplitNoteResponse:
      type: object
      required: [notes]
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteSummary"
          description: >
            Summaries (without full content) of the notes created by the split,
            in document order.

    Artifact:
      type: object
      required: [sha256, content_type, created_at]
      properties:
        sha256:
          type: string
          description: Hex-encoded SHA-256 of the artifact content (64 lowercase hex chars).
          pattern: "^[0-9a-f]{64}$"
        content_type:
          type: string
          description: MIME type of the artifact content.
        created_at:
          type: string
          format: date-time

    Tag:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"

    TagList:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    CreateTagRequest:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
