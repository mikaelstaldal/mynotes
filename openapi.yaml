openapi: 3.0.3
info:
  title: MyNotes API
  description: >
    REST API for the mynotes application. A `notes` resource demonstrates the
    full stack: OpenAPI → ogen server stubs → handler → service → repository →
    SQLite. Endpoints are served under the `/api/v1` base path (applied via the
    server URL and ogen's path prefix). Timestamps use RFC 3339 (UTC). Errors
    return `{"error": "message"}`.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /notes:
    get:
      operationId: listNotes
      summary: List notes
      description: >
        Returns notes ordered by update time (newest first). When `q` is
        supplied, results are restricted to notes matching the full-text query.
      parameters:
        - name: q
          in: query
          description: Optional full-text search query.
          required: false
          schema:
            type: string
            maxLength: 200
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createNote
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: The created note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: getNote
      summary: Get a note by slug
      responses:
        "200":
          description: The requested note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateNote
      summary: Update a note (partial)
      description: Only the fields present in the request body are changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: The updated note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteNote
      summary: Delete a note
      responses:
        "204":
          description: Note deleted.
        default:
          $ref: "#/components/responses/Error"

  /import:
    post:
      operationId: importNote
      summary: Import a document as a note
      description: >
        Imports a document and saves it as a note. Use `Content-Type: text/html`
        to import HTML (converted to Markdown; title taken from the <title>
        element or the first heading). Use `Content-Type: text/markdown` to
        import Markdown directly (title taken from the first ATX heading or the
        filename). The produced Markdown is subject to the same validation as
        regular note creation.
      requestBody:
        required: true
        content:
          text/html:
            schema:
              type: string
          text/markdown:
            schema:
              type: string
      responses:
        "201":
          description: The created note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        default:
          $ref: "#/components/responses/Error"

  /artifacts:
    post:
      operationId: createArtifact
      summary: Upload an artifact
      description: >
        Uploads binary content and stores it as a content-addressed artifact
        keyed by the SHA-256 of the content. Uploading the same bytes twice
        returns the existing record unchanged. Supported content types are the
        common image formats. The SHA-256 hex digest is returned in the response
        and used in the artifact URL.
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/gif:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          image/svg+xml:
            schema:
              type: string
              format: binary
          application/mathml+xml:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: The created (or already existing) artifact.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
        default:
          $ref: "#/components/responses/Error"

  /artifacts/{sha256}:
    parameters:
      - name: sha256
        in: path
        required: true
        schema:
          type: string
          pattern: "^[0-9a-f]{64}$"
    delete:
      operationId: deleteArtifact
      summary: Delete an artifact
      responses:
        "204":
          description: Artifact deleted.
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}/download-markdown:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: downloadNoteMarkdown
      summary: Download a note as raw Markdown
      description: >
        Returns the note `content` as a raw Markdown body with a
        `Content-Disposition` attachment header. Errors keep the JSON
        `{"error": "message"}` shape.
      responses:
        "200":
          description: The note content as raw Markdown.
          headers:
            Content-Disposition:
              description: Attachment header carrying the download filename.
              required: true
              schema:
                type: string
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

  /notes/{slug}/download-html:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    get:
      operationId: downloadNoteHtml
      summary: Download a note as HTML
      description: >
        Converts the note `content` from Markdown to HTML on the server and
        returns a complete HTML document with a `Content-Disposition` attachment
        header. Errors keep the JSON `{"error": "message"}` shape.
      responses:
        "200":
          description: The note rendered as a complete HTML document.
          headers:
            Content-Disposition:
              description: Attachment header carrying the download filename.
              required: true
              schema:
                type: string
            X-Content-Type-Options:
              description: Prevents MIME sniffing.
              required: true
              schema:
                type: string
            Content-Security-Policy:
              description: Sandboxes the document so scripts cannot execute.
              required: true
              schema:
                type: string
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          $ref: "#/components/responses/Error"

components:
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Note:
      type: object
      required: [slug, title, content, created_at, updated_at]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
          description: Verbatim Markdown content.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NoteSummary:
      type: object
      required: [slug, title, created_at, updated_at, excerpt]
      properties:
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          minLength: 1
          maxLength: 200
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        excerpt:
          type: string
          description: Short text excerpt; empty string when none, never absent.

    NoteList:
      type: object
      required: [total, notes]
      properties:
        total:
          type: integer
          description: Number of notes returned in this page.
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteSummary"

    CreateNoteRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
          default: ""
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          maxLength: 1000000
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"

    Artifact:
      type: object
      required: [sha256, content_type, created_at]
      properties:
        sha256:
          type: string
          description: Hex-encoded SHA-256 of the artifact content (64 lowercase hex chars).
          pattern: "^[0-9a-f]{64}$"
        content_type:
          type: string
          description: MIME type of the artifact content.
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
