version: "2"

run:
  timeout: 5m

linters:
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
        - (*os.File).Close

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
